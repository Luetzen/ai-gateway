# =============================================================================
# Release Workflow — ai-gateway Library
# =============================================================================
# Creates a GitHub Release when a version tag is pushed.
#
# Trigger:
#   - Tags matching v*.*.* (e.g. v0.1.0, v1.2.3)
#
# Jobs:
#   1. validate  — Parse the tag, extract the semver version, and verify it
#                  matches the version declared in Cargo.toml.
#   2. ci        — Run the full CI suite (check, fmt, clippy, test) to ensure
#                  the tagged commit is healthy before releasing.
#   3. release   — Create a GitHub Release with auto-generated release notes.
#
# This is a public Rust library crate consumed via git tag dependencies.
# There is no Docker build, no deployment — just validation and release.
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Validate: ensure the git tag version matches Cargo.toml
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Tag Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse tag version
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Tag: $TAG"

          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Tag '$TAG' does not match the expected format v*.*.*"
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"
          echo "Parsed version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ steps.parse.outputs.version }}"

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Tag version:        $TAG_VERSION"

          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! Cargo.toml has '$CARGO_VERSION' but tag is 'v$TAG_VERSION'"
            exit 1
          fi

          echo "✅ Versions match: $TAG_VERSION"

  # ---------------------------------------------------------------------------
  # CI: full quality gate (check, fmt, clippy, test)
  # ---------------------------------------------------------------------------
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-features

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

      - name: cargo test
        run: cargo test --verbose

  # ---------------------------------------------------------------------------
  # Release: create a GitHub Release with auto-generated notes
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, ci]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.validate.outputs.version }}
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
